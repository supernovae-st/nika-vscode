name: ci

# The PR gate the extension lacked: release.yml packages on tag, but
# nothing checked a PR — a type error or a manifest/source parity drift
# reached main unguarded. Mirrors the repo's own `npm test` contract.
# No user-controlled input reaches the shell.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gate:
    name: typecheck · tests · parity · lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Compile (typecheck both passes + esbuild — parity needs out/)
        run: npm run compile
      - name: Tests + parity + lint (the repo's own contract)
        run: npm test
      # The SSOT loops, closed consumer-side (the docs-oracle pattern):
      # every *.generated.ts must be byte-exactly what the spec's
      # projectors emit from their YAML SSOTs — a hand edit here, or a
      # spec that moved without a resync, reds this PR instead of
      # drifting silently. The projectors also re-prove every starter
      # and authoring shape against the conformance oracle first.
      # SECURITY: no github.event data is interpolated — the only
      # expression is the runner-controlled workspace path.
      - name: Fetch the spec SSOT at the PIN (sibling layout)
        # SPEC_PIN, never a floating HEAD: a spec merge must not red
        # unrelated PRs here. The spec-pin-heal advances the pin daily
        # through an idempotent PR these same gates judge.
        run: |
          git clone --filter=blob:none https://github.com/supernovae-st/nika-spec ../spec
          pin="$(grep -v '^#' SPEC_PIN | head -1 | tr -d '[:space:]')"
          git -C ../spec checkout --quiet "$pin"
          echo "spec pinned at $pin"
      - uses: actions/setup-python@v7
        with:
          python-version: '3.12'
      - name: Generated surfaces track the spec projectors
        # starters (verbStarters.generated.ts · oracle re-proof + byte diff)
        # AND authoring shapes (authoringShapes.generated.ts — schema +
        # armor registers, same oracle law) AND design tokens
        # (design-tokens.generated.ts — tokens-parity.mjs only guards
        # INTERNAL coherence). Absent siblings (website · docs) skip.
        env:
          NIKA_VSCODE_SRC: ${{ github.workspace }}/src
        run: |
          pip install pyyaml jsonschema
          python3 ../spec/scripts/starters-projector.py --check
          python3 ../spec/scripts/authoring-projector.py --check
          python3 ../spec/scripts/design-projector.py --check
