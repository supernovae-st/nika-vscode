<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../../out/webview/dag.css">
  <title>Nika DAG gif harness</title>
  <script>
    let __state;
    window.acquireVsCodeApi = () => ({
      postMessage: (m) => console.log('[toExt]', JSON.stringify(m).slice(0, 200)),
      getState: () => __state,
      setState: (s) => { __state = s; },
    });
    // Harness canary — the pixel-proof page must never lie by silence.
    // A boot exception once left 7 handler-less cards and three judges
    // called the corpse healthy. This strip is fixture-side on purpose:
    // the canary cannot depend on the bundle it guards.
    (() => {
      const scream = (msg) => {
        console.log('[HARNESS-WALL] ' + msg);
        let el = document.getElementById('harness-wall');
        if (!el) {
          el = document.createElement('div');
          el.id = 'harness-wall';
          el.style.cssText = 'position:fixed;bottom:0;left:0;right:0;z-index:9999;'
            + 'background:#5c1a1a;color:#ffd7d7;font:600 12px/1.6 monospace;'
            + 'padding:4px 10px;border-top:2px solid #ff5555;';
          document.documentElement.appendChild(el);
        }
        el.textContent = 'HARNESS WALL — ' + msg;
      };
      window.addEventListener('error', (ev) => scream(ev.message || 'script error'));
      window.addEventListener('unhandledrejection', (ev) => {
        const r = ev.reason;
        scream((r && r.message) ? r.message : String(r));
      });
    })();
  </script>
</head>
<body data-nk-theme="nika" class="vscode-dark">
  <script>
    // The pixel-proof page honors ?skin=nika|editor|phosphor — the same
    // body attribute dagPanel stamps. Without this the page silently
    // shot the NIKA skin three times and called it three proofs.
    (() => {
      const skin = new URLSearchParams(location.search).get('skin');
      if (skin === 'editor' || skin === 'phosphor' || skin === 'nika') {
        document.body.dataset.nkTheme = skin;
      }
    })();
  </script>
  <div id="aurora" aria-hidden="true"></div>
  <input id="dag-search" type="text" placeholder="filter tasks — / to open · Esc to clear" hidden aria-label="Filter tasks">
  <div id="dag-toolbar">
    <span id="dag-mark" aria-hidden="true"></span>
    <span id="dag-title"></span>
    <span class="tb-sep"></span>
    <div class="tb-group"><button id="btn-add-task">＋ Task</button><button id="btn-new">⧇ New</button></div>
    <div class="tb-group">
      <button id="btn-zoom-out">−</button>
      <button id="zoom-pct">100%</button>
      <button id="btn-zoom-in">＋</button>
      <span class="tb-inner-sep"></span>
      <button id="btn-fit">Fit<kbd>F</kbd></button>
      <button id="btn-relayout">⌗<kbd>A</kbd></button>
    </div>
    <div class="tb-group">
      <button id="btn-waves">≋<kbd>W</kbd></button>
      <button id="btn-timeline">▤<kbd>T</kbd></button>
      <button id="btn-audit">▦<kbd>P</kbd></button>
      <button id="btn-dataflow">⧉<kbd>D</kbd></button>
      <button id="btn-curve">∿</button>
      <button id="btn-heat">▥<kbd>H</kbd></button>
      <button id="btn-follow">⌖<kbd>G</kbd></button>
      <button id="btn-feed">≣<kbd>L</kbd></button>
      <button id="btn-help">?<kbd>?</kbd></button>
    </div>
    <div class="tb-group">
      <button id="btn-export-svg">⤓ svg</button>
      <button id="btn-export-png">⤓ png</button>
    </div>
    <span id="dag-status"></span>
  </div>
  <div id="dag-container"></div>
  <form id="canvas-describe" hidden autocomplete="off" aria-label="Describe this workflow">
    <div class="cd-pill">
      <span class="cd-mark" aria-hidden="true">✨</span>
      <input id="cd-input" type="text"
             placeholder="Describe this workflow — the tasks land checked by the engine…"
             aria-label="Describe the workflow to generate">
      <button id="cd-go" type="submit">↵</button>
    </div>
    <div class="cd-hint">or press <kbd>N</kbd> — add a task from the palette (a verb, or a builtin tool)</div>
  </form>
  <nav id="plan-rail" hidden aria-label="Execution plan"></nav>
  <div id="minimap"><svg id="minimap-svg"></svg><div id="minimap-viewport"></div></div>
  <div id="activity" hidden>
    <div id="activity-head">Activity</div>
    <div id="activity-list"></div>
  </div>
  <div id="empty-state" hidden>
    <svg id="es-ghost" viewBox="0 0 640 360" aria-hidden="true">
      <g class="esg-edges">
        <path d="M 96 96 C 160 96 160 168 224 168" />
        <path d="M 96 240 C 160 240 160 168 224 168" />
        <path d="M 96 240 C 176 240 176 264 256 264" />
        <path d="M 288 168 C 360 168 360 120 432 120" />
        <path d="M 320 264 C 376 264 376 120 432 120" class="esg-run-edge" />
        <path d="M 496 120 C 544 120 544 192 592 192" />
      </g>
      <g class="esg-dots">
        <circle cx="96" cy="96" r="7" class="esg-exec" />
        <circle cx="96" cy="240" r="7" class="esg-exec" />
        <circle cx="256" cy="168" r="9" class="esg-infer" />
        <circle cx="288" cy="264" r="7" class="esg-invoke" />
        <circle cx="464" cy="120" r="9" class="esg-infer esg-run" />
        <circle cx="592" cy="192" r="8" class="esg-agent" />

    </svg>
    <div class="es-card">
      <div class="es-hero"><div class="es-word">Nika</div>
      <div class="es-tag">The workflow canvas — audited before a token is spent.</div></div>
      <div id="es-recent" hidden>
        <div class="es-sec">Recent in this workspace</div>
        <div id="es-recent-list"></div>
      </div>
    </div>
  </div>
  <div id="explainer" hidden></div>
  <div id="verb-cmdk" hidden>
    <input id="cmdk-input" type="text" placeholder="add a task — verb or tool…" role="combobox" aria-expanded="false" aria-controls="cmdk-list" aria-autocomplete="list" aria-label="Filter verbs and tools">
    <div id="cmdk-list" role="listbox" aria-label="Pick the new task's verb"></div>
  </div>
  <div id="run-verdict" role="status" hidden></div>
  <div id="omnibar">
    <div id="run-controls" role="toolbar">
      <button id="btn-run" class="rc-run">▶ Run</button>
      <button id="run-preflight" hidden></button>
      <span id="run-cost" hidden></span>
      <span id="run-stale" hidden></span>

      <button id="btn-run-mock" class="rc-mock">▶ mock</button>
      <button id="btn-stop" class="rc-stop" hidden>■ Stop</button>
    </div>
    <div id="verb-palette" role="toolbar">
      <button class="vp-btn vp-infer" data-verb="infer">◇</button>
      <button class="vp-btn vp-exec" data-verb="exec">▷</button>
      <button class="vp-btn vp-invoke" data-verb="invoke">◆</button>
      <button class="vp-btn vp-agent" data-verb="agent">✦</button>
    </div>
    <input id="omni-input" type="text" placeholder="+ infer after gather · / filter …">
    <button id="omni-go">↵</button>
  </div>
  <div id="scrubber" hidden>
    <button id="scrub-play">▶</button>
    <div id="scrub-track"><div id="scrub-fill"></div><div id="scrub-handle"></div></div>
    <span id="scrub-time">0.0s</span>
    <button id="scrub-close">✕</button>
  </div>
  <div id="dag-legend">
    <span id="legend-heat" aria-hidden="true"><i class="lh-bar"></i><span class="lh-label"></span></span>
    <div id="legend-chips"></div>
    <div id="progress-track"><div id="progress-fill"></div></div>
  </div>
  <div id="transport" hidden>
    <button id="tr-play">▶</button>
    <div id="tr-track"><div id="tr-ticks" aria-hidden="true"></div>
      <input id="tr-scrub" type="range" min="0" max="1000" step="1" value="0"></div>
    <span id="tr-time">0:00.0 / 0:00.0</span>
  </div>
  <script src="../../out/webview/dag.js"></script>
  <script>
    // Scripted run timeline for the README hero GIF — states illustrative,
    // shapes and chrome are the real webview bundle (out/webview/dag.{js,css}).
    const CHART_SVG = 'data:image/svg+xml;utf8,' + encodeURIComponent(
      '<svg xmlns="http://www.w3.org/2000/svg" width="320" height="180">'
      + '<rect width="320" height="180" fill="#0a0f1e"/>'
      + '<g fill="#4f86ff">'
      + '<rect x="28"  y="52"  width="34" height="104"/>'
      + '<rect x="76"  y="76"  width="34" height="80"/>'
      + '<rect x="124" y="96"  width="34" height="60"/>'
      + '<rect x="172" y="116" width="34" height="40"/>'
      + '<rect x="220" y="130" width="34" height="26"/>'
      + '<rect x="268" y="140" width="34" height="16"/>'
      + '</g>'
      + '<line x1="20" y1="156" x2="308" y2="156" stroke="#31415f" stroke-width="2"/>'
      + '<text x="24" y="30" fill="#8db4ff" font-family="monospace" font-size="13">commits by author</text>'
      + '</svg>');

    const GRAPH = {
      workflowName: 'release-notes',
      workflowUri: 'file:///work/release-notes.nika.yaml',
      resumeCapable: true,
      nodes: [
        {
          id: 'history', avgMs: 1500, avgRuns: 4,  label: 'history', verb: 'exec', status: 'pending',
          commandPreview: 'git log --oneline --no-merges -8',
          permits: ['exec: git'],
          producers: [],
        },
        {
          id: 'stats', avgMs: 900, avgRuns: 4,  label: 'stats', verb: 'exec', status: 'pending',
          commandPreview: 'git shortlog -sn HEAD',
          permits: ['exec: git'],
          producers: [],
        },
        {
          id: 'digest', avgMs: 6200, avgRuns: 4,  label: 'digest', verb: 'infer', status: 'pending',
          model: 'ollama/qwen3.5:4b', provider: 'ollama',
          promptPreview: 'Group these commits into a headline and highlights for the release notes.',
          retryMax: 3, timeout: '45s', outputNames: ['headline', 'highlights'],
          typedShape: '{ headline: string, highlights: string[] }',
          thinkingBudget: 4000, visionCount: 1,
          bindingsIn: [{ alias: 'commits', from: 'history', path: 'output' }],
          producers: ['history'],
        },
        {
          id: 'chart', avgMs: 1400, avgRuns: 3,  label: 'chart', verb: 'invoke', status: 'pending',
          tool: 'nika:chart', fanOutKind: 'each', fanOutCount: 6, maxParallel: 3, failFast: false,
          argsPreview: 'kind: bar · title: commits by author',
          bindingsIn: [{ alias: 'rows', from: 'stats', path: 'output' }],
          producers: ['stats'],
        },
        {
          id: 'polish', avgMs: 2100, avgRuns: 4,  label: 'polish', verb: 'infer', status: 'pending',
          model: 'mistral/mistral-small', provider: 'mistral',
          promptPreview: 'Tighten the headline. Keep the maintainer voice — plain, direct.',
          costMin: 0.001, costMax: 0.006, timeout: '30s',
          bindingsIn: [{ alias: 'draft', from: 'digest', path: 'headline' }],
          producers: ['digest'],
        },
        {
          id: 'notes', avgMs: 700, avgRuns: 4,  label: 'notes', verb: 'invoke', status: 'pending', secretLiterals: 1,
          tool: 'nika:write',
          argsPreview: 'path: RELEASE_NOTES.md',
          permits: ['fs.write: RELEASE_NOTES.md', 'tool: nika:write'],
          outputNames: ['notes_path'],
          bindingsIn: [
            { alias: 'body', from: 'polish', path: 'output' },
            { alias: 'chart', from: 'chart', path: 'output' },
          ],
          finallyCount: 2,
          producers: ['polish', 'chart'],
        },
        {
          id: 'brief', avgMs: 1200, avgRuns: 2,  label: 'brief', verb: 'invoke', status: 'pending',
          tool: 'workflow:./brief.nika.yaml',
          subManifest: { tasks: 4, waves: 2, costMin: 0.001, costMax: 0.004, permits: 3,
            contract: [
              { name: 'topic', state: 'supplied', type: 'string' },
              { name: 'style', state: 'default', type: 'string' },
              { name: 'depth', state: 'required-unset' },
            ],
            skeleton: {
              nodes: [
                { id: 'gather', verb: 'exec', wave: 0 },
                { id: 'outline', verb: 'infer', wave: 1 },
                { id: 'draft', verb: 'infer', wave: 1 },
                { id: 'save', verb: 'invoke', wave: 2 },
              ],
              edges: [
                { source: 'gather', target: 'outline' },
                { source: 'gather', target: 'draft' },
                { source: 'outline', target: 'save' },
                { source: 'draft', target: 'save' },
              ],
            } },
          argsPreview: 'topic: release',
          bindingsIn: [{ alias: 'headline', from: 'digest', path: 'headline' }],
          producers: ['digest'],
        },
        {
          id: 'review', avgMs: 2700, avgRuns: 4,  label: 'review', verb: 'agent', status: 'pending',
          toolsCount: 2,
          model: 'ollama/qwen3.5:9b', provider: 'ollama',
          promptPreview: 'Verify every claim against the commits — flag anything overstated.',
          retryMax: 2,
          bindingsIn: [{ alias: 'notes', from: 'notes', path: 'notes_path' }],
          producers: ['notes'],
        },
      ],
      edges: [
        // The typed-kind fixture (graph_format 2): every closed-set kind
        // on one canvas — the harness IS the vocabulary's pixel proof.
        { id: 'history->digest', source: 'history', target: 'digest', kind: 'value', isDataEdge: true, label: 'commits' },
        { id: 'stats->chart', source: 'stats', target: 'chart', kind: 'value', isDataEdge: true, label: 'rows' },
        { id: 'digest->polish', source: 'digest', target: 'polish', kind: 'value', isDataEdge: true, label: 'draft' },
        { id: 'polish->notes', source: 'polish', target: 'notes', kind: 'value', isDataEdge: true, label: 'body' },
        { id: 'stats->digest', source: 'stats', target: 'digest', kind: 'control', predicate: 'succeeded' },
        { id: 'chart->notes', source: 'chart', target: 'notes', kind: 'terminal-observation', isDataEdge: true, label: 'chart' },
        { id: 'notes->review', source: 'notes', target: 'review', kind: 'failure-observation', isDataEdge: true, label: 'errors' },
        { id: 'digest->review', source: 'digest', target: 'review', kind: 'recovery' },
        { id: 'digest->brief', source: 'digest', target: 'brief', kind: 'value', isDataEdge: true, label: 'headline' },
      ],
    };

    const post = (m) => window.postMessage(m, '*');
    const batch = (updates) => post({ kind: 'dag:batchUpdateStatus', updates });

    // ?still — the graph loads, the scripted run STAYS QUIET. A judge
    // driving its own statuses must not wrestle the demo timeline
    // (assign-never-accumulate means the sim would erase its facts).
    const STILL = new URLSearchParams(location.search).has('still');
    const EMPTY = new URLSearchParams(location.search).has('empty');
    // ?n=300 — the perf fixture: a generated layered DAG (deterministic,
    // no randomness: index math only) replaces the demo. Implies ?still.
    const PERF_N = Number(new URLSearchParams(location.search).get('n') || 0);
    function perfGraph(n) {
      const verbs = ['exec', 'infer', 'invoke', 'agent'];
      const nodes = []; const edges = [];
      const COLS = Math.ceil(Math.sqrt(n / 2));
      for (let i = 0; i < n; i++) {
        const id = 't' + i;
        nodes.push({
          id, label: id, verb: verbs[i % 4], status: 'pending',
          ...(i % 4 === 1 ? { model: 'mock/echo', promptPreview: 'perf node ' + i } : {}),
          ...(i % 4 === 2 ? { tool: 'nika:jq', argsPreview: 'query: .a' } : {}),
          producers: [],
        });
        const wave = Math.floor(i / COLS);
        if (wave > 0) {
          const parent = 't' + ((wave - 1) * COLS + (i % COLS));
          edges.push({ id: parent + '->' + id, source: parent, target: id, kind: i % 7 === 3 ? 'control' : 'value', ...(i % 7 === 3 ? { predicate: 'succeeded' } : { isDataEdge: true, label: 'd' + i }) });
          nodes[i].producers = [parent];
          if (i % 5 === 0 && i % COLS > 0) {
            const uncle = 't' + ((wave - 1) * COLS + (i % COLS) - 1);
            edges.push({ id: uncle + '->' + id, source: uncle, target: id, kind: 'value', isDataEdge: true, label: 'x' + i });
            nodes[i].producers.push(uncle);
          }
        }
      }
      return { workflowUri: 'file:///work/perf.nika.yaml', workflowName: 'perf-' + n, nodes, edges };
    }

    const sim = (fn, ms) => { if (!STILL && !EMPTY && !(PERF_N > 0)) { setTimeout(fn, ms); } };

    // t=0 is page load. dag:load waits out the load race (≥500ms).
    setTimeout(() => {
      if (EMPTY) { return; }
      if (PERF_N > 0) { post({ kind: 'dag:load', graph: perfGraph(PERF_N) }); return; }
      post({
        kind: 'dag:load', graph: GRAPH,
        toolCats: {
          chart: { cat: 'media', desc: 'data → chart image (5 renderers)' },
          write: { cat: 'file', desc: 'Write a file' },
        },
      });
    }, 600);

    sim(() => {
      post({ kind: 'run:state', running: true });
      batch([
        { taskId: 'history', status: 'running' },
        { taskId: 'stats', status: 'running' },
      ]);
      post({ kind: 'run:progress', done: 0, total: 7 });
    }, 1900);

    sim(() => {
      batch([
        { taskId: 'history', status: 'success', durationMs: 245, outputPreview: '8 commits' },
        { taskId: 'stats', status: 'success', durationMs: 182 },
        { taskId: 'digest', status: 'running' },
        { taskId: 'chart', status: 'running' },
      ]);
      post({ kind: 'run:progress', done: 2, total: 7 });
    }, 3100);

    sim(() => {
      batch([{ taskId: 'digest', status: 'success', durationMs: 2840, outputPreview: 'headline: « the release train picks up parallel rails »' }]);
      post({ kind: 'run:progress', done: 3, total: 7 });
    }, 6000);

    sim(() => {
      batch([{ taskId: 'chart', status: 'success', durationMs: 3405 }]);
      post({
        kind: 'dag:artifacts',
        artifacts: [{
          taskId: 'chart', kind: 'image', src: CHART_SVG,
          path: '/work/out/commits-by-author.svg', name: 'commits-by-author.svg',
          tip: 'nika:chart · deterministic SVG',
        }],
      });
      post({ kind: 'run:progress', done: 4, total: 7 });
    }, 6700);

    sim(() => { batch([{ taskId: 'polish', status: 'running' }]); }, 7200);

    sim(() => {
      batch([{ taskId: 'polish', status: 'success', durationMs: 2130, usd: 0.0031 }]);
      post({ kind: 'run:progress', done: 5, total: 7 });
    }, 9400);

    sim(() => { batch([{ taskId: 'notes', status: 'running' }]); }, 9900);

    sim(() => {
      batch([{ taskId: 'notes', status: 'success', durationMs: 96, outputPreview: 'RELEASE_NOTES.md · 1.4 KB' }]);
      post({
        kind: 'dag:artifacts',
        artifacts: [
          { taskId: 'chart', kind: 'image', src: CHART_SVG,
            path: '/work/out/commits-by-author.svg', name: 'commits-by-author.svg',
            tip: 'nika:chart · deterministic SVG' },
          { taskId: 'notes', kind: 'file',
            src: '/work/RELEASE_NOTES.md', path: '/work/RELEASE_NOTES.md',
            name: 'RELEASE_NOTES.md', tip: 'nika:write · 4.1 KB' },
        ],
      });
      post({ kind: 'run:progress', done: 6, total: 7 });
    }, 10700);

    sim(() => { batch([{ taskId: 'review', status: 'running' }]); }, 11200);

    sim(() => {
      batch([{ taskId: 'review', status: 'success', durationMs: 2760 }]);
      post({ kind: 'run:progress', done: 7, total: 7 });
    }, 14000);

    sim(() => {
      post({ kind: 'run:state', running: false });
      post({ kind: 'run:verdict', icon: '✓', text: 'run completed · 7/7 · ≥ $0.0031 · 12.6s · chain 8f41c2aa', cls: 'st-success' });
    }, 14500);
  </script>
</body>
</html>
